<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>近代史选择题刷题平台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #f0f2f5;
  color: #333;
  min-height: 100vh;
  padding-bottom: 90px;
  -webkit-tap-highlight-color: transparent;
}
.header {
  background: #2F5496;
  color: #fff;
  padding: 14px 16px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  position: sticky; top:0; z-index:100;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

.tabs {
  display: flex; gap: 8px; padding: 10px 14px; background: #fff;
  border-bottom: 1px solid #ddd;
  position: sticky; top: 66px; z-index: 99;
}
.tab {
  flex: 1; padding: 10px 6px; border: 1.5px solid #ddd; border-radius: 10px;
  background: #fff; font-size: 13px; font-weight: 500; cursor: pointer;
  text-align: center; transition: all 0.2s;
}
.tab.active { background: #2F5496; color: #fff; border-color: #2F5496; }

.stats {
  display: flex; justify-content: space-around; padding: 10px 14px;
  font-size: 12px; color: #999; background: #fff;
  border-bottom: 1px solid #eee;
}
.stats b { font-weight: 600; }
.stats .c { color: #0B8043; }
.stats .w { color: #C52828; }

.progress-bar { height: 4px; background: #e8e8e8; }
.progress-fill { height: 100%; background: #4177C9; transition: width 0.3s; }

.main { padding: 14px; }

.q-card {
  background: #fff; border-radius: 14px; padding: 18px 16px;
  margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.q-num { font-size: 13px; color: #2F5496; font-weight: 700; margin-bottom: 8px; }
.q-text { font-size: 16px; line-height: 1.7; }

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.opt-btn {
  display: flex; align-items: center; width: 100%;
  padding: 14px 14px; border: 1.5px solid #ddd; border-radius: 12px;
  background: #fff; font-size: 15px; text-align: left; cursor: pointer;
  transition: all 0.15s; line-height: 1.4;
}
.opt-btn:active { transform: scale(0.98); }
.opt-letter {
  width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
  background: #f0f2f5; color: #2F5496; font-weight: 700; font-size: 14px;
  display: flex; align-items: center; justify-content: center; margin-right: 12px;
}
.opt-btn.correct { border-color: #0B8043; background: #e8f5e9; }
.opt-btn.correct .opt-letter { background: #0B8043; color: #fff; }
.opt-btn.wrong { border-color: #C52828; background: #ffebee; }
.opt-btn.wrong .opt-letter { background: #C52828; color: #fff; }
.opt-btn.dim { opacity: 0.45; }

.feedback {
  padding: 10px 14px; border-radius: 10px; font-size: 14px;
  font-weight: 600; display: none; margin-bottom: 14px;
}
.feedback.show { display: block; }
.feedback.ok { background: #e8f5e9; color: #0B8043; }
.feedback.bad { background: #ffebee; color: #C52828; }

.bottom {
  position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
  border-top: 1px solid #ddd; display: flex; align-items: center;
  padding: 8px 14px; gap: 8px; z-index: 100;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.nav-btn {
  flex: 1; padding: 12px 8px; border: 1.5px solid #2F5496;
  border-radius: 10px; background: #fff; color: #2F5496;
  font-size: 14px; font-weight: 600; cursor: pointer; text-align: center;
}
.nav-btn:disabled { opacity: 0.3; }
.nav-btn.go { background: #2F5496; color: #fff; flex: 1.5; }
.nav-grid {
  width: 42px; height: 42px; border: 1.5px solid #ddd;
  border-radius: 10px; background: #fff; font-size: 20px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: none; align-items: flex-end;
}
.overlay.on { display: flex; }
.grid-box {
  background: #fff; border-radius: 18px 18px 0 0;
  padding: 18px 14px; max-height: 70vh; overflow-y: auto; width: 100%;
  padding-bottom: max(18px, env(safe-area-inset-bottom));
}
.grid-box h3 { text-align: center; font-size: 15px; color: #2F5496; margin-bottom: 12px; }
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
.gn {
  aspect-ratio: 1; border: 1px solid #ddd; border-radius: 6px;
  font-size: 11px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: #f5f6f8; color: #aaa;
}
.gn.cur { border: 2px solid #2F5496; background: #fff; color: #2F5496; font-weight: 700; }
.gn.ok { background: #c8e6c9; color: #2e7d32; border-color: #a5d6a7; }
.gn.bad { background: #ffcdd2; color: #b71c1c; border-color: #ef9a9a; }
.grid-close {
  display: block; margin: 14px auto 0; padding: 10px 40px;
  background: #2F5496; color: #fff; border: none; border-radius: 10px;
  font-size: 14px; cursor: pointer;
}
.empty { text-align: center; padding: 60px 20px; color: #999; }
.empty .icon { font-size: 48px; margin-bottom: 14px; }

/* 自测成绩弹窗 */
.result-overlay { align-items: center; }
.result-overlay.on { display: flex; }
.result-box {
  background: #fff; border-radius: 18px; padding: 32px 24px;
  margin: 0 20px; text-align: center; width: 100%; max-width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.result-icon { font-size: 52px; margin-bottom: 8px; }
.result-box h2 { font-size: 20px; color: #2F5496; margin-bottom: 16px; }
.result-score {
  font-size: 64px; font-weight: 800; color: #2F5496; line-height: 1;
  margin-bottom: 4px;
}
.result-sub { font-size: 13px; color: #999; margin-bottom: 20px; }
.result-detail {
  display: flex; justify-content: center; gap: 20px;
  font-size: 14px; color: #666; margin-bottom: 24px; flex-wrap: wrap;
}
.result-detail b { font-weight: 700; }
.result-detail .ok { color: #0B8043; }
.result-detail .bad { color: #C52828; }
.result-actions {
  display: flex; flex-direction: column; gap: 8px;
}
.result-btn {
  width: 100%; padding: 13px; border: 1.5px solid #ddd; border-radius: 12px;
  background: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.result-btn:active { transform: scale(0.98); }
.result-btn.primary { background: #2F5496; color: #fff; border-color: #2F5496; }

/* 自测进度得分 */
.test-score { color: #FF6F00; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <h1>📖 近代史选择题刷题平台</h1>
  <div class="sub">共 483 题 · 中国近现代史纲要 <span style="opacity:0.6;font-size:10px">v2.1</span></div>
</div>

<div class="tabs">
  <div class="tab active" data-mode="seq" id="tabSeq">📝 顺序</div>
  <div class="tab" data-mode="rand" id="tabRand">🎲 随机</div>
  <div class="tab" data-mode="rev" id="tabRev">🔁 错题</div>
  <div class="tab" data-mode="test" id="tabTest">📋 自测</div>
</div>

<div class="stats">
  <span>进度: <b id="prog">0/483</b></span>
  <span class="c">✅ <b id="cntOk">0</b></span>
  <span class="w">❌ <b id="cntBad">0</b></span>
  <span class="test-score" id="testScore" style="display:none;">得分: <b>0</b>/100</span>
  <span>正确率: <b id="acc">--</b></span>
</div>

<div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

<div class="main" id="mainArea">
  <div class="q-card">
    <div class="q-num" id="qNum">加载中...</div>
    <div class="q-text" id="qText"></div>
  </div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div id="errMsg" style="color:#C52828;padding:10px;display:none;"></div>
</div>

<div class="bottom">
  <button class="nav-btn" id="prevBtn">‹ 上一题</button>
  <button class="nav-btn go" id="nextBtn">下一题 ›</button>
  <button class="nav-grid" id="gridBtn">☰</button>
</div>

<div class="overlay" id="overlay">
  <div class="grid-box">
    <h3>📋 题号导航</h3>
    <div class="grid" id="grid"></div>
    <button class="grid-close" id="gridClose">关闭</button>
  </div>
</div>

<div class="overlay result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-icon">📊</div>
    <h2>自测成绩</h2>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-sub">满分 100 分</div>
    <div class="result-detail">
      <span>✅ 正确: <b class="ok" id="resultOk">0</b> 题</span>
      <span>❌ 错误: <b class="bad" id="resultBad">0</b> 题</span>
      <span>📈 正确率: <b id="resultAcc">0%</b></span>
    </div>
    <div class="result-actions">
      <button class="result-btn primary" id="retryTest">🔄 再来一次</button>
      <button class="result-btn" id="reviewTest">🔁 复习错题</button>
      <button class="result-btn" id="backTest">← 返回</button>
    </div>
  </div>
</div>

        nextBtn.textContent = '完成 ✓';
        progFill.style.width = '100%';
        progEl.textContent = '0/0';
        return;
      }

      var qi = order[pos];
      var q = ALL[qi];
      // 自测模式：完全隔离历史记录，只看本次自测答题状态
      var done, ok, picked;
      if (testMode) {
        done = !!testAnswered[qi];
        ok = done ? answers[qi] : undefined;
        picked = done ? chosen[qi] : undefined;
      } else {
        done = (answers[qi] !== undefined);
        ok = answers[qi];
        picked = chosen[qi];
      }

      qNum.textContent = '第 ' + (pos + 1) + ' 题';
      qText.textContent = q.q;

      var letters = ['A', 'B', 'C', 'D'];
      var h = '';
      for (var i = 0; i < 4; i++) {
        var cls = 'opt-btn';
        if (done) {
          if (letters[i] === q.a) cls += ' correct';
          else if (letters[i] === picked && !ok) cls += ' wrong';
          else if (mode !== 'rev' && mode !== 'test') cls += ' dim';
        }
        // 错题模式和自测模式始终允许点击重做
        var clickable = !done || mode === 'rev' || mode === 'test';
        var act = clickable ? (' data-qi="' + qi + '" data-l="' + letters[i] + '"') : '';
        h += '<div class="' + cls + '"' + act + '>';
        h += '<span class="opt-letter">' + letters[i] + '</span>';
        h += q.o[i];
        h += '</div>';
      }
      optDiv.innerHTML = h;

      fbDiv.className = 'feedback';
      if (done) {
        fbDiv.classList.add('show');
        if (ok) {
          fbDiv.classList.add('ok');
          fbDiv.textContent = '✔ 回答正确！';
        } else {
          fbDiv.classList.add('bad');
          fbDiv.textContent = '✘ 回答错误！正确答案是 ' + q.a + '. ' + q.o[letters.indexOf(q.a)];
        }
      }

      prevBtn.disabled = (pos <= 0);
      // 自测模式：检查是否还有未答的题
      if (testMode) {
        var hasNext = false;
        for (var i = pos + 1; i < order.length; i++) {
          if (!testAnswered[order[i]]) { hasNext = true; break; }
        }
        if (!hasNext) {
          nextBtn.textContent = '完成 ✓';
          nextBtn.disabled = false;
        } else {
          nextBtn.textContent = '下一题 ›';
          nextBtn.disabled = false;
        }
      } else if (pos >= order.length - 1) {
        nextBtn.textContent = '完成 ✓';
        nextBtn.disabled = true;
      } else {
        nextBtn.textContent = '下一题 ›';
        nextBtn.disabled = false;
      }

      progFill.style.width = ((pos + 1) / order.length * 100) + '%';
      progEl.textContent = (pos + 1) + '/' + order.length;
      updateGridHighlight();
    } catch(e) { logErr(e); }
  }

  // ===== ANSWER =====
  optDiv.addEventListener('click', function(e) {
    var btn = e.target.closest('.opt-btn');
    if (!btn) return;
    var qi = parseInt(btn.getAttribute('data-qi'));
    var l = btn.getAttribute('data-l');
    if (isNaN(qi) || !l) return;
    // 自测模式：本次已答过的题不允许重做；历史记录不影响自测
    if (testMode) {
      if (testAnswered[qi]) return;
    } else {
      // 非自测：已答对的题不允许重复作答；错题模式允许重做
      if (answers[qi] === true) return;
      if (mode !== 'rev' && answers[qi] !== undefined) return;
    }

    var q = ALL[qi];
    answers[qi] = (l === q.a);
    chosen[qi] = l;
    if (testMode) testAnswered[qi] = true;
    saveState();
    updateStats();

    // 清除之前的自动跳转定时器
    if (testTimer) clearTimeout(testTimer);

    // 错题模式答对：立即消除
    if (mode === 'rev' && answers[qi] === true) {
      order.splice(pos, 1);
      if (order.length === 0) {
        showQ();
        buildGrid();
        return;
      }
      if (pos >= order.length) pos = order.length - 1;
      showQ();
      buildGrid();
      return;
    }

    // 普通显示反馈
    showQ();
    buildGrid();

    // 自测模式：判断是否全部答完（只看本次自测）
    if (testMode) {
      var remaining = 0;
      for (var i = 0; i < order.length; i++) {
        if (!testAnswered[order[i]]) remaining++;
      }
      if (remaining === 0) {
        testTimer = setTimeout(function() { showTestResult(); }, 1200);
        return;
      }
    }

    // 自动跳转下一题（0.8秒延迟，自测模式跳过本次已答的题）
    testTimer = setTimeout(function() {
      if (testMode) {
        var nextPos = pos + 1;
        while (nextPos < order.length && testAnswered[order[nextPos]]) {
          nextPos++;
        }
        if (nextPos < order.length) pos = nextPos;
      } else {
        if (pos < order.length - 1) pos++;
      }
      showQ();
      buildGrid();
      updateStats();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }, 800);
  });

  // ===== NAVIGATION =====
  function go(dir) {
    if (testTimer) clearTimeout(testTimer);
    var np = pos + dir;
    if (np < 0 || np >= order.length) return;
    // 自测模式：跳过已答过的题
    if (testMode) {
      while (np >= 0 && np < order.length && testAnswered[order[np]]) {
        np += dir;
      }
      if (np < 0 || np >= order.length) return;
    }
    pos = np;
    showQ();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  prevBtn.addEventListener('click', function() { go(-1); });
  nextBtn.addEventListener('click', function() { go(1); });

  function jump(p) {
    if (testTimer) clearTimeout(testTimer);
    pos = p;
    showQ();
    overlay.classList.remove('on');
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  // ===== GRID =====
  function buildGrid() {
    var h = '';
    for (var i = 0; i < order.length; i++) {
      var qi = order[i];
      var cls = 'gn';
      if (i === pos) cls += ' cur';
      // 自测模式：未在本次自测答过的题，不显示历史对错
      else if (!testMode || testAnswered[qi]) {
        if (answers[qi] === true) cls += ' ok';
        else if (answers[qi] === false) cls += ' bad';
      }
      h += '<div class="' + cls + '" data-p="' + i + '">' + (i + 1) + '</div>';
    }
    gridEl.innerHTML = h;
  }

  function updateGridHighlight() {
    var cells = gridEl.querySelectorAll('.gn');
    cells.forEach(function(c) {
      var p = parseInt(c.getAttribute('data-p'));
      c.classList.remove('cur');
      if (p === pos) c.classList.add('cur');
      var qi = order[p];
      c.classList.remove('ok', 'bad');
      // 自测模式：未在本次自测答过的题，不显示历史对错
      if (!testMode || testAnswered[qi]) {
        if (answers[qi] === true) c.classList.add('ok');
        else if (answers[qi] === false) c.classList.add('bad');
      }
    });
  }

  gridEl.addEventListener('click', function(e) {
    var g = e.target.closest('.gn');
    if (!g) return;
    var p = parseInt(g.getAttribute('data-p'));
    if (!isNaN(p)) jump(p);
  });

  $('gridBtn').addEventListener('click', function() {
    buildGrid();
    overlay.classList.add('on');
  });

  $('gridClose').addEventListener('click', function() {
    overlay.classList.remove('on');
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('on');
  });

  // ===== TABS =====
  $('tabSeq').addEventListener('click', function() { setMode('seq'); });
  $('tabRand').addEventListener('click', function() { setMode('rand'); });
  $('tabRev').addEventListener('click', function() { setMode('rev'); });
  $('tabTest').addEventListener('click', function() { setMode('test'); });

  // ===== STATS =====
  function updateStats() {
    var total = 0, ok = 0, bad = 0;
    for (var k in answers) {
      total++;
      if (answers[k]) ok++; else bad++;
    }
    cntOk.textContent = ok;
    cntBad.textContent = bad;
    accEl.textContent = total > 0 ? (ok / total * 100).toFixed(1) + '%' : '--';

    // 自测模式：更新得分（仅统计本次自测答过的题）
    if (testMode) {
      testScoreEl.style.display = '';
      var testOk = 0, testDone = 0;
      for (var i = 0; i < order.length; i++) {
        var qi = order[i];
        if (testAnswered[qi]) {
          testDone++;
          if (answers[qi] === true) testOk++;
        }
      }
      testScoreEl.innerHTML = '得分: <b>' + (testOk * 2) + '</b>/100  (' + testDone + '/' + TEST_SIZE + ')';
    } else {
      testScoreEl.style.display = 'none';
    }
  }

  // ===== PERSIST =====
  function saveState() {
    try {
      var data = {a: answers, c: chosen};
      // 自测模式：保存测试状态（含版本号），防止页面重载丢失进度
      if (testMode) {
        data.tm = true;
        data.to = testAnswered;
        data.mo = mode;
        data.ord = order;
        data.ps = pos;
      }
      localStorage.setItem('quiz_njd', JSON.stringify(data));
    } catch(e) {}
  }

  function loadState() {
    try {
      var raw = localStorage.getItem('quiz_njd');
      if (raw) {
        var s = JSON.parse(raw);
        if (s.a) answers = s.a;
        if (s.c) chosen = s.c;
        // 恢复自测状态（防止手机页面重载丢失进度）
        if (s.tm) {
          testMode = true;
          testAnswered = s.to || {};
          mode = s.mo || 'test';
          order = s.ord || [];
          pos = s.ps || 0;
        }
      }
    } catch(e) {}
  }

  // ===== TEST RESULT =====
  function showTestResult() {
    if (testTimer) clearTimeout(testTimer);
    var testOk = 0, testBad = 0;
    for (var i = 0; i < order.length; i++) {
      var qi = order[i];
      if (answers[qi] === true) testOk++;
      else if (answers[qi] === false) testBad++;
    }
    var unanswered = order.length - testOk - testBad;
    // 未答的题算错
    testBad += unanswered;
    for (var i = 0; i < order.length; i++) {
      var qi = order[i];
      if (answers[qi] === undefined) {
        answers[qi] = false;
        chosen[qi] = '';
      }
    }
    // 清除自测状态（已完成），防止页面重载恢复已完成的自测
    testMode = false;
    testAnswered = {};
    saveState();

    var score = testOk * 2;
    $('resultScore').textContent = score;
    $('resultOk').textContent = testOk;
    $('resultBad').textContent = testBad;
    $('resultAcc').textContent = (testOk / TEST_SIZE * 100).toFixed(1) + '%';
    resultOverlay.classList.add('on');
    updateStats();
  }

  // 再来一次
  $('retryTest').addEventListener('click', function() {
    resultOverlay.classList.remove('on');
    setMode('test');
  });

  // 复习错题
  $('reviewTest').addEventListener('click', function() {
    resultOverlay.classList.remove('on');
    setMode('rev');
  });

  // 返回
  $('backTest').addEventListener('click', function() {
    resultOverlay.classList.remove('on');
    setMode('seq');
  });

  // 点击遮罩关闭
  resultOverlay.addEventListener('click', function(e) {
    if (e.target === resultOverlay) resultOverlay.classList.remove('on');
  });

  // ===== INIT =====
  try {
    loadState();
    // 如果恢复自测模式，保持已有order；否则初始化顺序模式
    if (!testMode) {
      buildOrder(false);
    } else {
      // 恢复自测UI状态
      document.getElementById("tabSeq").classList.remove("active");
      document.getElementById("tabTest").classList.add("active");
      testScoreEl.style.display = "";
    }
    updateStats();
    showQ();
    buildGrid();
  } catch(e) {
    qNum.textContent = '出错了';
    qText.textContent = '初始化失败: ' + (e.message || String(e));
    logErr(e);
  }
})();
</script>
</body>
</html>
